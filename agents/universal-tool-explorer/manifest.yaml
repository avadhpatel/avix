apiVersion: avix/v1
kind: Agent

metadata:
  name: universal-tool-explorer
  version: "0.1.0"
  description: "Discovers and exercises every available tool in the Avix OS. Creates a workspace project, generates a full system report with automatic history diffs, and summarizes findings using the LLM."
  author: "Avix Core Team"
  license: MIT
  tags:
    - demo
    - tools
    - explorer
    - workspace
    - testing

packaging:
  source: "system"
  signature: "sha256:"

spec:
  systemPromptPath: system-prompt.md

  requestedCapabilities:
    - kernel:*
    - fs:*
    - workspace:*
    - llm:inference
    - proc:*
    - session:read
    - session:write
    - cap:*

  entrypoint:
    type: llm-loop
    modelRequirements:
      minContextWindow: 128000
      requiredCapabilities: [tool_use]
      recommended: claude-sonnet-4
    maxToolChain: 50
    maxTurnsPerGoal: 50

  defaults:
    goalTemplate: "Explore the entire Avix tool registry, create a new project in the workspace using workspace/create-project, generate a complete system status report, write it to the workspace (triggering FileDiff parts in history), read it back, summarize the exploration with llm/complete, and finally mark the session Idle."

  visibility: public
  scope: system
