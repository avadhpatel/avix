name: universal-tool-explorer
version: "0.1.0"
description: "Discovers and exercises every available tool in the Avix OS. Creates a workspace project, generates a full system report with automatic history diffs, and summarizes findings using the LLM."
author: "Avix Core Team"
license: MIT
tags:
  - demo
  - tools
  - explorer
  - workspace
  - testing
system_prompt_path: system-prompt.md

# Additional spec fields (RuntimeExecutor settings)
spec:
  contextWindowTokens: 128000
  maxToolChainLength: 50
  hilRequiredTools: []

  # Capabilities this agent requests
  requestedCapabilities:
    - kernel:*
    - fs:*
    - workspace:*
    - llm:inference
    - proc:*
    - session:read
    - session:write
    - cap:*

  # Default goal shown in catalog / UI
  defaultGoalTemplate: "Explore the entire Avix tool registry, create a new project in the workspace using workspace/create-project, generate a complete system status report, write it to the workspace (triggering FileDiff parts in history), read it back, summarize the exploration with llm/complete, and finally mark the session Idle."

  # Catalog & visibility
  visibility: public
  scope: system
