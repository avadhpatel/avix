name: mcp-bridge
version: 0.1.0
source: system

unit:
  description: MCP bridge — connects external MCP servers to the Avix tool registry
  after:
    - kernel

service:
  binary: /services/mcp-bridge/bin/mcp-bridge
  language: any
  restart: on-failure
  restart_delay: 10s
  max_concurrent: 50
  queue_max: 200

capabilities:
  host_access:
    - network

tools:
  namespace: /tools/mcp/
  provides: []
